services:
  db:
    image: postgres:16
    container_name: dcf-postgres
    environment:
      POSTGRES_USER: dcf
      POSTGRES_PASSWORD: dcf
      POSTGRES_DB: dcf
    ports:
      - "5432:5432"
    volumes:
      - dcf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dcf_pgdata:
